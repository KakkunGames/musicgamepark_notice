<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽ゲーム of 集い お知らせ</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0b0c10;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロールバーはメインコンテンツ内だけに限定 */
        }
        .neon-text-green {
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #11121a;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 2px;
        }
    </style>
</head>
<body class="w-full h-screen flex justify-center items-center p-2">

    <!-- 350px × 500px のお知らせ枠（エメラルドグリーン基調） -->
    <div class="w-full h-full max-w-[350px] max-h-[500px] bg-[#12131e]/90 border border-emerald-900/40 rounded-2xl p-4 neon-border backdrop-blur-md flex flex-col justify-between overflow-hidden">
        
        <!-- ヘッダー -->
        <header class="flex items-center gap-2 pb-3 border-b border-emerald-950/40 flex-shrink-0">
            <div class="bg-emerald-950/60 p-1.5 rounded-lg border border-emerald-500/30">
                <i data-lucide="megaphone" class="w-4 h-4 text-emerald-400"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-wider text-white neon-text-green">INFORMATION</h1>
                <p class="text-[10px] text-gray-500">サーバーの最新ニュース</p>
            </div>
        </header>

        <!-- お知らせリスト（スクロール可能エリア） -->
        <main id="news-container" class="flex-1 my-3 overflow-y-auto pr-1 custom-scroll space-y-2.5">
            <div class="text-xs text-gray-500 text-center py-8">お知らせを読み込み中...</div>
        </main>

        <!-- フッターボタン -->
        <footer class="pt-2 border-t border-gray-800/60 flex-shrink-0">
            <a href="https://sites.google.com/view/musicgamesquare/Homepage" target="_blank" class="flex items-center justify-center gap-1.5 w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-2 px-4 rounded-xl transition-all duration-200 active:scale-95">
                <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                公式サイトトップへ
            </a>
        </footer>

    </div>

    <script>
        // タグの種類に応じた色分け設定
        const tagClasses = {
            important: "bg-red-950/50 text-red-400 border border-red-500/20",
            update: "bg-blue-950/50 text-blue-400 border border-blue-500/20",
            event: "bg-purple-950/50 text-purple-400 border border-purple-500/20"
        };

        // txtからお知らせを取得して画面に表示する
        async function loadNews() {
            const container = document.getElementById('news-container');
            try {
                // 同じフォルダにあるnews.txtを読み込む（キャッシュ防止にタイムスタンプを付与）
                const response = await fetch('news.txt?t=' + new Date().getTime());
                if (!response.ok) throw new Error('データの取得に失敗したよ');
                
                const textData = await response.text();
                container.innerHTML = ''; // ローディング表示をクリア

                // 改行コードで分割して1行ずつループするよ（空行は無視）
                const lines = textData.split(/\r?\n/).filter(line => line.trim() !== "");

                if (lines.length === 0) {
                    container.innerHTML = '<div class="text-xs text-gray-500 text-center py-8">お知らせはありません。</div>';
                    return;
                }

                lines.forEach(line => {
                    // パイプ「|」でデータを切り分ける
                    const parts = line.split('|');
                    if (parts.length < 5) return; // データが足りない行は飛ばす

                    const date = parts[0].trim();
                    const type = parts[1].trim();
                    const typeName = parts[2].trim();
                    const title = parts[3].trim();
                    const desc = parts[4].trim();

                    // タグのスタイルを決定（登録がない場合はグレー）
                    const tagStyle = tagClasses[type] || "bg-gray-800 text-gray-400 border border-gray-700";
                    
                    const itemHtml = `
                        <div class="bg-[#161724]/60 border border-emerald-950/20 p-2.5 rounded-xl space-y-1">
                            <div class="flex items-center justify-between text-[10px]">
                                <span class="text-emerald-400 font-mono">${date}</span>
                                <span class="${tagStyle} px-1.5 py-0.2 rounded font-bold scale-90">${typeName}</span>
                            </div>
                            <h2 class="text-xs font-bold text-white leading-snug">${title}</h2>
                            <p class="text-[11px] text-gray-400 leading-relaxed">${desc}</p>
                        </div>
                    `;
                    container.innerHTML += itemHtml;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="text-xs text-red-400 text-center py-8">お知らせの読み込みに失敗しました。</div>';
            }
        }

        window.addEventListener('load', () => {
            lucide.createIcons();
            loadNews();
        });
    </script>
</body>
</html>
